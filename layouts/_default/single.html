{{ define "main" }}
<article class="project-page">
  <p class="back-link"><a href="/#projects">← Back to projects</a></p>
  <p class="eyebrow">Project</p>
  <h1>{{ .Title }}</h1>
  {{ with .Params.status }}<p class="project-page-status">{{ . }}</p>{{ end }}
  <div class="project-page-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
