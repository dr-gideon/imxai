<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }} | {{ site.Params.role }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Serif+Display:ital@0;1&family=Fraunces:opsz,wght,SOFT@9..144,400..700,0..100&family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header{{ if .IsHome }} home-header{{ end }}">
    <a href="/" class="site-brand">{{ site.Params.brand }}</a>
    <nav class="site-nav">
      {{ range site.Menus.main }}
      <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </header>
  <main{{ if .IsHome }} class="home-main"{{ end }}>
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <p>{{ site.Params.collaborationCredit }}</p>
  </footer>
  <script src="/marquee.js"></script>
</body>
</html>
